<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Course Finder Preview</title>
  <link rel="stylesheet" href="./assets/course-finder.css">
  <style>
    body {
      margin: 0;
      background: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100% - 24px, 1040px);
      margin: 16px auto;
    }

    .preview-empty {
      padding: 24px;
      border: 1px solid #d8e3ec;
      border-radius: 8px;
      color: #64748b;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <main id="preview-root"></main>

  <script>
    (function () {
      const root = document.getElementById("preview-root");
      const encoded = window.location.hash ? window.location.hash.slice(1) : "";

      if (!encoded) {
        root.innerHTML = '<div class="preview-empty">Choose options in the configurator to generate a preview.</div>';
        return;
      }

      try {
        root.innerHTML = decodeURIComponent(encoded);
      } catch (error) {
        root.innerHTML = '<div class="preview-empty">Preview could not be generated.</div>';
      }
    }());
  </script>
  <script src="./assets/course-finder.js"></script>
</body>
</html>
